$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
type: command
name: evaluate_component
display_name: "Evaluate Model on Test Set"
description: >
  Evaluate the trained model on the held-out test set. Logs accuracy,
  F1, precision, recall, and ROC-AUC to MLflow. Writes a JSON report.
version: "1"

inputs:
  test_data:
    type: uri_folder
    description: "Folder containing test.csv (output of data_prep)."
  trained_model:
    type: uri_folder
    description: "Folder containing model.pkl (output of train)."

outputs:
  evaluation_output:
    type: uri_folder
    description: "Folder with evaluation_report.json."

code: ./
environment: azureml:blueprint-example-sklearn-env:1
command: >
  python evaluate.py
  --test_data ${{inputs.test_data}}
  --trained_model ${{inputs.trained_model}}
  --evaluation_output ${{outputs.evaluation_output}}
