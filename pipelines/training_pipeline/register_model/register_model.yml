$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
type: command
name: register_model_component
display_name: "Register Model in Azure ML Registry"
description: >
  Register the trained model in the Azure ML Model Registry via MLflow.


version: "1"

inputs:
  trained_model:
    type: uri_folder
    description: "Folder containing model.pkl (output of train)."
  evaluation_output:
    type: uri_folder
    description: "Folder containing evaluation_report.json (output of evaluate)."
  model_name:
    type: string
    default: "blueprint-example-readmission-model"
    description: "Name to register the model under."

outputs:
  register_output:
    type: uri_folder
    description: "Folder with registration_info.json."

code: ./
environment: azureml:blueprint-env:1
command: >
  python register_model.py --trained_model ${{inputs.trained_model}} --evaluation_output ${{inputs.evaluation_output}} --model_name ${{inputs.model_name}} --register_output ${{outputs.register_output}}

